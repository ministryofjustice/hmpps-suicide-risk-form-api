name: Security veracode pipeline scan
on:
  workflow_dispatch:
  schedule:
    - cron: "9 3 * * MON-FRI" # Every weekday

jobs:
  security-veracode-pipeline-scan:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security veracode pipeline scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_veracode_pipeline_scan.yml@85aaea1bb60639a12bb495cdfe8db46c2d61b54d # v2.15.1
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
