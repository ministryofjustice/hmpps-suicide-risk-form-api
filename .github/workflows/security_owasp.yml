name: Security OWASP dependency check
on:
  workflow_dispatch:
  schedule:
    - cron: "9 3 * * MON-FRI" # Every weekday

jobs:
  security-kotlin-owasp-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Kotlin security OWASP dependency check
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_owasp.yml@e3a6dc63e5eeadbc1fa221c4057fcec949bc47b8 # v2.14.13
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
