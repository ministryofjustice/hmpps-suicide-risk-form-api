name: Security OWASP dependency check
on:
  workflow_dispatch:
  schedule:
    - cron: "9 3 * * MON-FRI" # Every weekday

jobs:
  security-kotlin-owasp-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Kotlin security OWASP dependency check
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_owasp.yml@3d0db04bde36486d182b5c7d4a3bb8794bdeb2c6 # v2.18.0
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
