name: Security OWASP dependency check
on:
  workflow_dispatch:
  schedule:
    - cron: "9 3 * * MON-FRI" # Every weekday

jobs:
  security-kotlin-owasp-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Kotlin security OWASP dependency check
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_owasp.yml@8d9c52e65720e36d445d9611f68ca4afd8494526 # v2.14.3
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
